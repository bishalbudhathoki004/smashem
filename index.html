<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smash 'Em</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="start-screen" id="start-screen">
    <h1>🎯 Smash 'Em! 🎯</h1>
    <p class="subtitle">The Ultimate Whack-a-Mole Challenge</p>
    <div class="mole-preview">🐹</div>
    <div class="instructions">
      Click on the moles as they pop up from their holes! <br>
      You have 15 seconds to score as many points as possible. <br>
      Be quick - they don't stay up for long!
    </div>
    <button class="start-button" id="start-game-btn">Start Game</button>
    <div class="high-score">High Score: <span id="high-score">0</span></div>
  </div>

  <div class="game-screen" id="game-screen">
    <h1>🎯 Smash 'Em!</h1>
    <div class="game-stats">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Time Left</div>
        <div class="stat-value" id="timer">15</div>
      </div>
    </div>
    <div id="game-over">
      Game Over! <br>
      Final Score: <span id="final-score">0</span>
    </div>
    <div class="game">
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
    </div>
    <button class="restart-button" id="restart-btn" style="display: none;">Play Again</button>
    <button class="restart-button" id="back-btn">Back to Menu</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
